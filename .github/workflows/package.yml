name: Package

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: sh

jobs:
  package:
    name: ${{ matrix.target }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            deb_arch: amd64
            rpm_arch: x86_64
            elf_machine: Advanced Micro Devices X86-64
          - target: aarch64-unknown-linux-musl
            deb_arch: arm64
            rpm_arch: aarch64
            elf_machine: AArch64

    env:
      BINARY: target/${{ matrix.target }}/release/opencode-bill
      DEB_ARCH: ${{ matrix.deb_arch }}
      ELF_MACHINE: ${{ matrix.elf_machine }}
      RPM_ARCH: ${{ matrix.rpm_arch }}
      TARGET: ${{ matrix.target }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install system tools
        run: sh scripts/ci/package.sh install-system-tools

      - name: Install Cargo tools
        run: sh scripts/ci/package.sh install-cargo-tools

      - name: Build static binary
        run: sh scripts/ci/package.sh build

      - name: Build packages
        run: sh scripts/ci/package.sh package

      - name: Verify packages
        run: sh scripts/ci/package.sh verify

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: opencode-bill-${{ matrix.deb_arch }}
          path: dist/
          if-no-files-found: error

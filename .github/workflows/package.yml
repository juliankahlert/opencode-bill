name: Package

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: sh

jobs:
  package:
    name: ${{ matrix.target }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            deb_arch: amd64
            rpm_arch: x86_64
            elf_machine: Advanced Micro Devices X86-64
          - target: aarch64-unknown-linux-musl
            deb_arch: arm64
            rpm_arch: aarch64
            elf_machine: AArch64

    env:
      BINARY: target/${{ matrix.target }}/release/opencode-bill
      DEB_ARCH: ${{ matrix.deb_arch }}
      ELF_MACHINE: ${{ matrix.elf_machine }}
      RPM_ARCH: ${{ matrix.rpm_arch }}
      TARGET: ${{ matrix.target }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install system tools
        run: |
          set -eu

          sudo apt-get update
          sudo apt-get install --yes binutils cpio rpm

      - name: Install Cargo tools
        run: |
          set -eu

          cargo install --locked cargo-zigbuild@0.23.0
          cargo install --locked cargo-deb@3.7.0
          cargo install --locked cargo-generate-rpm@0.21.0

      - name: Build static binary
        run: |
          set -eu

          cargo zigbuild --locked --release --target "$TARGET"
          test -x "$BINARY"
          readelf -hW "$BINARY" | grep -q "Machine:.*$ELF_MACHINE"

          if readelf -lW "$BINARY" | grep -q INTERP; then
            printf '%s\n' "binary has a dynamic interpreter" >&2
            exit 1
          fi

          if readelf -dW "$BINARY" | grep -q '(NEEDED)'; then
            printf '%s\n' "binary has a shared-library dependency" >&2
            exit 1
          fi

      - name: Build packages
        run: |
          set -eu

          mkdir -p dist
          cargo deb --locked --no-build --no-strip --target "$TARGET" --output dist
          cargo generate-rpm --target "$TARGET" --arch "$RPM_ARCH" --auto-req disabled --output dist

      - name: Verify packages
        run: |
          set -eu

          set -- dist/*.deb
          test "$#" -eq 1
          test -f "$1"
          deb=$1

          set -- dist/*.rpm
          test "$#" -eq 1
          test -f "$1"
          rpm=$1

          test "$(dpkg-deb --field "$deb" Architecture)" = "$DEB_ARCH"
          test "$(rpm --query --package --queryformat '%{ARCH}' "$rpm")" = "$RPM_ARCH"

          verify_dir=$(mktemp -d)
          trap 'rm -rf "$verify_dir"' 0 HUP INT TERM
          mkdir -p "$verify_dir/deb-root" "$verify_dir/rpm-root"
          dpkg-deb --extract "$deb" "$verify_dir/deb-root"
          rpm2cpio "$rpm" > "$verify_dir/package.cpio"
          (
            cd "$verify_dir/rpm-root"
            cpio --quiet -id < "$verify_dir/package.cpio"
          )

          cmp "$BINARY" "$verify_dir/deb-root/usr/bin/opencode-bill"
          cmp "$BINARY" "$verify_dir/rpm-root/usr/bin/opencode-bill"

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: opencode-bill-${{ matrix.deb_arch }}
          path: dist/
          if-no-files-found: error
